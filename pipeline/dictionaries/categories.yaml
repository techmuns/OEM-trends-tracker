# Per-category block structure — the taxonomy + terminators live here, NOT in code, because
# every category in File 1 has a different physical layout. Each category is a separate
# adapter that reads its config from this file.
#
# Fields:
#   label               human label
#   source              the reporting body (share denominator scope)
#   native_frequency    month | quarter
#   has_ev              true only where EV is a clean derivable subset (2W). For PV/3W/CV
#                       the EV makers sit INLINE among ICE makers, so EV is NOT derivable —
#                       the UI must render EV unavailable, never a wrong number.
#   has_production      whether this category carries a production flow
#   sheet               source sheet in File 1
#   region_end          label that ends this category's region (exclusive)
#   industry_totals     flow -> the reported industry-total row label (ingested as reported).
#                       Omit when the source has no single industry-total row for the flow.
#   industry_from_segment_totals
#                       true when there is NO single industry-total row: the industry total
#                       is the sum of the REPORTED per-segment totals (still reported figures,
#                       never a maker-sum). Used by 3W (domestic = Passenger total + Goods total).
#   region_end          omit for the last region on the sheet (parse runs to the end).
#   segments            flow -> { segment-header-label: {segment, terminator} }
#                       terminators differ per segment/flow (e.g. "PC Volumes", not "Total").

version: 1

categories:
  "2W":
    label: Two-Wheelers
    source: SIAM
    native_frequency: month
    has_ev: true
    has_production: false # 2W production is only in File 2 (added in Phase 2)

  # VAHAN registrations — a SEPARATE tab, not a SIAM category. `row_category: ALL` keeps its
  # store/manifest/view key ("VAHAN") distinct from every SIAM category while filtering the
  # all-vehicle rows (ContractRow.category="ALL"). Registrations, not dispatches; all-India;
  # no exports/production. has_ev/has_production here are documentation — build_view derives
  # them from the data (industry EV from the fuel-wise export).
  VAHAN:
    label: India Registrations · VAHAN
    source: VAHAN
    native_frequency: month
    row_category: ALL
    has_ev: true
    has_production: false

  PV:
    label: Passenger Vehicles
    source: SIAM
    native_frequency: month
    has_ev: false # EV-only makers sit inline; EV volume is not derivable
    has_production: false
    sheet: "OEM - Summary - 2W, PV, 3W"
    region_start: "Domestic PC"
    region_end: "THREE WHEELERS"
    industry_totals:
      domestic: "Total DOMESTIC PV"
      export: "Total EXPORT PV"
    segments:
      domestic:
        "Domestic PC": { segment: PC, terminator: "PC Volumes" }
        "Domestic UV": { segment: UV, terminator: "UV Volumes" }
        "Vans": { segment: Van, terminator: "Total Vans" }
      export:
        "Passenger Cars (Export)": { segment: PC, terminator: "Total Export Passenger Cars" }
        "Utility Vehicles (Export)": { segment: UV, terminator: "Total Export UV" }
        "Vans (Export)": { segment: Van, terminator: "Total Export Vans" }

  "3W":
    label: Three-Wheelers
    source: SIAM
    native_frequency: month
    has_ev: false # EV-only makers (Mahindra Electric, TI Clean Mobility, Pinnacle) sit inline
    has_production: false
    sheet: "OEM - Summary - 2W, PV, 3W"
    region_start: "THREE WHEELERS"
    # region_end omitted: 3W is the last region on the sheet — parse runs to the end.
    # No single "Total 3W" row exists; the industry total is the sum of the reported segment
    # totals (Passenger total + Goods total for domestic). Still reported, never a maker-sum.
    industry_from_segment_totals: true
    segments:
      domestic:
        "Passenger 3W": { segment: Passenger, terminator: "Passenger total" }
        "Goods 3W": { segment: Goods, terminator: "Goods total" }
      export:
        "Exports - Passenger 3W": { segment: Passenger, terminator: "Total Exports Passenger" }

  CV:
    label: Commercial Vehicles
    source: SIAM
    native_frequency: quarter # CV is reported QUARTERLY, not monthly — quarters are the base
    has_ev: false # electric-bus makers (Olectra, PMI, Switch, JBM) sit inline
    has_production: true # CV carries a production flow (unlike 2W/PV/3W in File 1)
    sheet: "CV"
    header_row: 1 # quarter labels ("1QFY20"...) live in row 1
    # Three flow regions on one sheet, each with the same four leaf segments. Within a region
    # the grand "Total CVs" row is the reported industry total; the intermediate subtotals
    # ("Total M&HCVs", "Total LCVs") and the maker-rollup "... - Overall" tail are skipped so
    # nothing is double-counted.
    industry_total: "Total CVs"
    skip_rows: ["Total M&HCVs", "Total LCVs"]
    segments:
      "M&HCV Passenger": { segment: "M&HCV Passenger", terminator: "Total M&HCV (P)" }
      "M&HCV Goods": { segment: "M&HCV Goods", terminator: "Total M&HCV (G)" }
      "LCV - Passenger": { segment: "LCV Passenger", terminator: "Total LCV (P)" }
      "LCV - Goods": { segment: "LCV Goods", terminator: "Total LCV (G)" }
    flow_regions:
      domestic: { region_start: "Domestic Sales", region_end: "Domestic Sales - Overall" }
      export: { region_start: "Exports", region_end: "Export Sales - Overall" }
      production: { region_start: "Production" } # last region — parse runs to the end
