  # builders — Olectra, PMI, Switch, JBM — and Pinnacle/TI Clean) sit inline and are flagged
  # is_ev_only for display only. Ashok Leyland, Tata, M&M, Force Motors, Maruti, Toyota
  # Kirloskar, Piaggio, Hindustan Motors, Pinnacle and TI Clean reuse existing canonicals.
  - canonical: AMW Motors
    category_hint: CV
    aliases: [AMW Motors Ltd]
  - canonical: Isuzu Motors India
    category_hint: CV
    aliases: [Isuzu Motors India Pvt Ltd]
  - canonical: JBM Auto
    category_hint: CV
    is_ev_only: true # JBM Ecolife — electric buses
    aliases: [JBM Auto Ltd]
  - canonical: Olectra Greentech
    category_hint: CV
