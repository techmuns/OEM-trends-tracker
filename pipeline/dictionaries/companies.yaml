# Company alias -> canonical resolver.
#
# Seeded with REAL Two-Wheeler names as they appear in the source workbook
# (`Auto_Database__Summary__-_Spark.xlsx`, sheet "OEM - Summary - 2W, PV, 3W"). No guessed
# names. Note the genuine alias variance the raw data contains — this is exactly why every
# row keeps both `company_raw` and `company_canonical`:
#   - "Bajaj Auto Ltd" (ICE blocks) vs "Bajaj Auto" (EV block)
#   - "Honda Motorcycle & Scooter India (Pvt) Ltd" vs "...India Pvt Ltd" (EV block, no parens)
#   - "India Kawasaki MotorsPrivate Ltd" (missing space — source typo)
#
# v1 scope is 2W only, but the FORMAT generalises to every category without a rewrite:
# add PV/3W/Tractor/CV makers under the same structure. `category` on a row is a
# dimension, never inferred from this file.
#
# Reminder (encode, don't design around): Ola Electric is a major e-2W maker that is
# ABSENT from this SIAM-based workbook. That absence is the concrete reason share is
# always labelled "Share within reported SIAM universe", never plain "market share".

version: 1

companies:
  - canonical: Ather Energy
    category_hint: 2W
    is_ev_only: true # pure-EV 2W maker — volume is all electric, no ICE line
    aliases:
      - Ather Energy Pvt. Ltd

  - canonical: Bajaj Auto
    category_hint: 2W
    aliases:
      - Bajaj Auto Ltd
      - Bajaj Auto           # EV-block spelling

  - canonical: Hero MotoCorp
    category_hint: 2W
    aliases:
      - Hero MotoCorp Ltd

  - canonical: Honda Motorcycle & Scooter India
    category_hint: 2W
    aliases:
      - Honda Motorcycle & Scooter India (Pvt) Ltd
      - Honda Motorcycle & Scooter India Pvt Ltd   # EV-block spelling (no parens)
      - HMSI                                        # File 2 (monthly SIAM) spelling

  - canonical: India Yamaha Motor
    category_hint: 2W
    aliases:
      - India Yamaha Motor Pvt Ltd
      - Yamaha                                      # File 2 spelling

  - canonical: Mahindra Two Wheelers
    category_hint: 2W
    aliases:
      - Mahindra Two Wheelers Ltd

  - canonical: Okinawa Autotech
    category_hint: 2W
    is_ev_only: true # pure-EV 2W maker — volume is all electric, no ICE line
    aliases:
      - Okinawa Autotech Pvt. Ltd

  - canonical: Piaggio Vehicles
    category_hint: 2W
    aliases:
      - Piaggio Vehicles Pvt Ltd

  - canonical: Suzuki Motorcycle India
    category_hint: 2W
    aliases:
      - Suzuki Motorcycle India Pvt Ltd
      - Suzuki Motorcycles                          # File 2 spelling

  - canonical: TVS Motor Company
    category_hint: 2W
    aliases:
      - TVS Motor Company Ltd
      - TVS Motor                                   # File 2 spelling

  - canonical: Harley-Davidson India
    category_hint: 2W
    aliases:
      - H-D Motor Company India Pvt Ltd

  - canonical: India Kawasaki Motors
    category_hint: 2W
    aliases:
      - India Kawasaki MotorsPrivate Ltd   # source typo: missing space before "Private"

  - canonical: Royal Enfield
    category_hint: 2W
    aliases:
      - Royal Enfield (Unit of Eicher Ltd)

  - canonical: Triumph Motorcycles India
    category_hint: 2W
    aliases:
      - Triumph Motorcycles (India) Pvt Ltd

  - canonical: UM Lohia Two Wheelers
    category_hint: 2W
    aliases:
      - UM Lohia Two Wheelers Pvt Ltd

  # File 2 (monthly SIAM) publishes an explicit residual bucket for makers it does not
  # break out individually. It is a legitimate row (the reported-universe remainder), not
  # a company — kept so maker-level share sums to the reported total.
  - canonical: Others
    category_hint: 2W
    aliases:
      - Others

  # --- Passenger Vehicles (Phase 4) ---
  # EV is NOT derivable for PV: EV-only makers sit inline among ICE makers, and a maker
  # line like "Tata Motors" is all powertrains (its EVs cannot be separated). `is_ev_only`
  # is a company attribute for display/badging only — it is NEVER summed into an EV total.
  - canonical: Maruti Suzuki India
    category_hint: PV
    aliases: [Maruti Suzuki India Ltd]
  - canonical: Hyundai Motor India
    category_hint: PV
    aliases: [Hyundai Motor India Ltd]
  - canonical: Tata Motors
    category_hint: PV
    aliases: [Tata Motors Ltd]
  - canonical: Mahindra & Mahindra
    category_hint: PV
    aliases: [Mahindra & Mahindra Ltd]
  - canonical: Mahindra Electric Mobility
    category_hint: PV
    is_ev_only: true
    aliases: [Mahindra Electric Mobility Ltd]
  - canonical: Toyota Kirloskar Motor
    category_hint: PV
    aliases: [Toyota Kirloskar Motor Pvt Ltd]
  - canonical: Honda Cars India
    category_hint: PV
    aliases: [Honda Cars India Ltd, Honda Siel Cars India Ltd] # Honda Siel = former name, same entity
  - canonical: Kia Motors
    category_hint: PV
    aliases: [Kia Motors]
  - canonical: MG Motor India
    category_hint: PV
    aliases: [MG Motor India Pvt Ltd]
  - canonical: Renault India
    category_hint: PV
    aliases: [Renault India Pvt Ltd]
  - canonical: Nissan Motor India
    category_hint: PV
    aliases: [Nissan Motor India Pvt Ltd]
  - canonical: Skoda Auto India
