    aliases: [Olectra Greentech Limited]
  - canonical: PMI Electro Mobility
    category_hint: CV
    is_ev_only: true # pure electric buses
    aliases: [PMI Electro Mobility Solutions Pvt Ltd]
  - canonical: SML Isuzu
    category_hint: CV
    aliases: [SML Isuzu Ltd]
  - canonical: Scania Commercial Vehicles India
    category_hint: CV
    aliases: [Scania Commercial Vehicles India Pvt Ltd]
  - canonical: Switch Mobility
    category_hint: CV
    is_ev_only: true # Ashok Leyland's EV arm — pure electric CVs
    aliases: [Switch Mobility Automotive Ltd]
  - canonical: VECV-Eicher
    category_hint: CV
    aliases: [VECV-Eicher]
  - canonical: VECV-Volvo
    category_hint: CV
    aliases: [VECV-Volvo]
  - canonical: Volvo Group India
    category_hint: CV
    aliases: [Volvo Group India Pvt Ltd]

  # --- VAHAN registrations (all-India, ALL vehicle categories) ---
  # VAHAN is a DIFFERENT source (registrations, not SIAM dispatches) and names makers
  # differently — UPPERCASE full legal names, often split into several lines per group
  # (Tata PV / EV / trucks; Mahindra auto / tractor / last-mile). Strings below are the
  # EXACT maker labels from the vahan4dashboard "Maker Month Wise" export, whitespace-
  # collapsed to match the adapter's cleaning. Several lines map to one canonical so the
  # maker view shows the GROUP. The all-vehicle export's long tail is summed into "Others"
  # by the adapter (not aliased here). Ola Electric etc. are makers PRESENT in VAHAN and
  # ABSENT from SIAM — the concrete reason the two sources must never share a table.
  - canonical: Ola Electric
    category_hint: 2W
    is_ev_only: true
    aliases: [OLA ELECTRIC TECHNOLOGIES PVT LTD]
  - canonical: Greaves Electric Mobility
    category_hint: 2W
    is_ev_only: true # Ampere / Greaves — electric 2W
    aliases: [GREAVES ELECTRIC MOBILITY LTD]
  - canonical: International Tractors
    category_hint: TRACTOR
    aliases: [INTERNATIONAL TRACTORS LIMITED] # Sonalika
  - canonical: TAFE
    category_hint: TRACTOR
    aliases: [TAFE LIMITED] # Tractors and Farm Equipment
  - canonical: Escorts Kubota
    category_hint: TRACTOR
    aliases: [ESCORTS KUBOTA LIMITED (AGRI MACHINERY GROUP)]
  - canonical: John Deere India
