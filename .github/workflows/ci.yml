name: CI

# Lint + test + schema validation + type generation drift check + site build.
# Green on every PR and every push to main.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    name: pipeline (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install Python deps
        run: uv sync --extra dev

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check contract types (tsc)
        run: pnpm run typecheck

      # Proves schema.json <-> models.py <-> types.ts are in sync, the fixture validates,
      # and all Phase-0 behaviour (adapters/gates/snapshot/revisions/periods/guard) holds.
      - name: Test (pytest)
        run: uv run pytest -q

      - name: Build deployable site (smoke)
        run: bash scripts/build-site.sh
