name: Monthly ingest

# The self-driving feed. Runs monthly and on-demand. It processes any workbook dropped in
# data/raw/incoming/ (a human commits the licensed file there — the one manual step): it
# parses -> validates -> on all gates pass writes a snapshot + normalized store + bundle,
# archives the file to data/raw/processed/, and commits the result, which Cloudflare Pages
# auto-deploys. On any gate failure it quarantines the file and the job FAILS — that
# failure is the alert, and the last good bundle stays live (nothing is committed).
on:
  schedule:
    # 06:30 UTC on the 3rd of each month (SIAM monthly data lands early in the month).
    - cron: "30 6 3 * *"
  workflow_dispatch:

permissions:
  contents: write  # Phase 2 commits new snapshots/bundle back to the repo

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    name: ingest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Python deps
        run: uv sync --extra dev

      - name: Run ingest
        run: uv run python -m pipeline.ingest

      - name: Commit accepted data (triggers Cloudflare deploy)
        if: success()
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            # refresh the served view-models so the committed dist/ shows fresh data
            # (UI code is unchanged, so no rebuild is needed): every per-category view plus
            # the manifest, skipping the canonical bundles the UI never reads.
            mkdir -p dist/data
            cp data/bundle/categories.json dist/data/categories.json
            for v in data/bundle/*.json; do
              base=$(basename "$v")
              case "$base" in
                categories.json|bundle*.json) continue ;;
              esac
              cp "$v" "dist/data/$base"
            done
            git config user.name "oem-tracker-bot"
            git config user.email "actions@github.com"
            git add data/ dist/data/
            git commit -m "ingest: automated data update [skip ci]"
            git push
          else
            echo "no data changes to commit"
          fi
