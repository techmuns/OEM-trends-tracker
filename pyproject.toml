[project]
name = "oem-tracker-pipeline"
version = "0.1.0"
description = "OEM Tracker data pipeline — frozen contract, adapters, validation, aggregation, store (Phase 0 foundation)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "jsonschema>=4.21",
    "openpyxl>=3.1",
    "pandas>=2.2",
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
    "datamodel-code-generator>=0.25",
    # pinned explicitly so contract codegen output is byte-stable for the sync test
    "black>=24.0",
    "isort>=5.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pipeline"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["pipeline/contract/models.py"]  # generated file

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]
